    let currentIdx = { word: 0, dialogue: 0, textbook: 0 };
    let isLooping = false;
    let loopTimeout;

    // --- 시스템 로직 ---
    function showSection(id, btn) {
        stopLooping();
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) btn.classList.add('active');
        if(id === 'dialogue-section') { isLooping = true; playLoop('dialogue'); }
        if(id === 'textbook-section') { isLooping = true; playLoop('textbook'); }
    }

    function jumpTo(type) {
        const val = parseInt(document.getElementById(type + 'Jump').value) - 1;
        const list = type === 'word' ? wordList : (type === 'dialogue' ? dialogueList : textbookList);
        if(val >= 0 && val < list.length) {
            currentIdx[type] = val;
            type === 'word' ? loadWord() : (type === 'dialogue' ? loadSentence('dialogue') : loadSentence('textbook'));
        }
    }

    // 1. 어휘
    function loadWord() {
        const q = wordList[currentIdx.word];
        document.getElementById('word-status').innerText = `어휘 ${currentIdx.word + 1} / ${wordList.length}`;
        document.getElementById('word-display').innerText = q.en;
        const optBox = document.getElementById('word-options'); optBox.innerHTML = '';
        let opts = [{t: q.ko, c: true}];
        while(opts.length < 4) {
            let r = wordList[Math.floor(Math.random()*wordList.length)].ko;
            if(!opts.find(o => o.t === r)) opts.push({t: r, c: false});
        }
        opts.sort(() => Math.random() - 0.5);
        opts.forEach(o => {
            const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o.t;
            b.onclick = () => {
                if(o.c) {
                    b.classList.add('correct-btn'); saveRecord('word');
                    setTimeout(() => { if(currentIdx.word+1 < wordList.length){currentIdx.word++; loadWord();} }, 400);
                } else alert("다시 확인해보세요!");
            };
            optBox.appendChild(b);
        });
        speak(q.en);
    }

    // 2 & 3. 영작 (공통)
    function loadSentence(type) {
        stopLooping();
        const list = type === 'dialogue' ? dialogueList : textbookList;
        const idx = currentIdx[type];
        if(!list[idx]) return;
        const q = list[idx];
        const suffix = type === 'dialogue' ? '' : '-t';
        
        document.getElementById(`${type}-status`).innerText = `${type==='dialogue'?'대화문':'본문'} ${idx + 1} / ${list.length}`;
        document.getElementById(`${type}-ko`).innerText = q.ko;
        
        const area = document.getElementById(`answer-area${suffix}`);
        const scrambled = document.getElementById(`scrambled-words${suffix}`);
        area.innerHTML = ''; scrambled.innerHTML = ''; area.style.background = '';
        
        let words = q.en.replace(/[.,?!"]/g, "").split(' ');
        let shuffled = [...words].sort(() => Math.random() - 0.5);
        
        shuffled.forEach(w => {
            const b = document.createElement('button'); b.className = 'word-block'; b.innerText = w;
            b.onclick = () => {
                if(b.parentElement === scrambled) area.appendChild(b); else scrambled.appendChild(b);
                if(scrambled.children.length === 0) {
                    const studentAns = Array.from(area.children).map(x => x.innerText).join(' ');
                    const correctAns = q.en.replace(/[.,?!"]/g, "");
                    if(studentAns === correctAns) {
                        area.style.background = '#C6F6D5'; saveRecord(type); stopLooping(); speak(q.en);
                        setTimeout(() => { 
                            if(currentIdx[type]+1 < list.length) { currentIdx[type]++; loadSentence(type); }
                            else alert("축하합니다! 완료!");
                        }, 1200);
                    } else { area.style.background = '#FED7D7'; setTimeout(() => area.style.background = '', 400); }
                }
            };
            scrambled.appendChild(b);
        });
        isLooping = true; playLoop(type);
    }

    // TTS 로직
    function speak(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.8;
        window.speechSynthesis.speak(u); return u;
    }
    function playLoop(type) {
        if(!isLooping) return;
        const list = type === 'dialogue' ? dialogueList : textbookList;
        const text = list[currentIdx[type]]?.en;
        if(!text) return;
        const u = speak(text);
        u.onend = () => { if(isLooping) loopTimeout = setTimeout(() => playLoop(type), 2000); };
    }
    function stopLooping() { isLooping = false; clearTimeout(loopTimeout); window.speechSynthesis.cancel(); }
    function saveRecord(type) {
        const d = new Date().toLocaleDateString();
        let h = JSON.parse(localStorage.getItem('surinamu_v2')) || {};
        if(!h[d]) h[d] = {word:0, dialogue:0, textbook:0};
        h[d][type]++; localStorage.setItem('surinamu_v2', JSON.stringify(h));
    }
    function renderHistory() {
        const container = document.getElementById('history-list'); container.innerHTML = '';
        const h = JSON.parse(localStorage.getItem('surinamu_v2')) || {};
        Object.keys(h).sort().reverse().forEach(date => {
            const data = h[date]; const total = data.word + data.dialogue + data.textbook;
            const card = document.createElement('div'); card.className = 'history-card';
            card.innerHTML = `<div class="history-date">${date} ${total >= 20 ? '<span class="stamp">참 잘했어요!</span>' : ''}</div>
                <div style="font-size:13px;">단어: ${data.word} | 대화문: ${data.dialogue} | 본문: ${data.textbook}</div>`;
            container.appendChild(card);
        });
    }
    window.onload = () => { loadWord(); loadSentence('dialogue'); loadSentence('textbook'); };
</script>
